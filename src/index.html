<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Faltantes</title><link rel="stylesheet" href="styles.css"></head><body><header><h1>Cuaderno de faltantes</h1><p>Registro rápido para ferretería</p></header><main><section class="card"><h2>Agregar faltante</h2><label>Usuario<input id="user" placeholder="Nombre"></label><label>Buscar producto<input id="search" autocomplete="off" placeholder="Ej: clavo chico, pintura, 779..."></label><div id="suggestions"></div><label>Cantidad<input id="qty" type="number" min="0.01" step="0.01" value="1"></label><label>Unidad<input id="unit" placeholder="unidad, caja, kg"></label><label>Urgencia<select id="urgency"><option>normal</option><option>alta</option><option>baja</option></select></label><label>Local / área<input id="location" placeholder="Mostrador, depósito..."></label><label>Observación<textarea id="notes" rows="2"></textarea></label><button id="save">Guardar faltante</button><p id="selected" class="muted">Sin producto seleccionado. Si guardas así quedará pendiente de clasificar.</p></section><section class="card"><h2>Faltantes pendientes</h2><div class="filters"><input id="filterText" placeholder="Filtrar"><select id="filterStatus"><option value="">Todos</option><option>pendiente</option><option>revisado</option><option>pedido</option><option>recibido</option><option>cancelado</option></select><select id="filterUrgency"><option value="">Urgencia</option><option>alta</option><option>normal</option><option>baja</option></select></div><div id="shortages"></div></section><section class="card"><h2>Productos oficiales y alias</h2><p class="muted">Base inicial editable desde el código; preparada para sincronizar con facturador.</p><div id="products"></div></section></main><script src="app.js"></script></body></html>
